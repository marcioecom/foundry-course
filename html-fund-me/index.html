<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FundMe</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>FundMe</h1>
        <p>Decentralized crowdfunding</p>
      </div>

      <!-- Wallet Connection -->
      <div class="card">
        <div class="card-title">Wallet</div>
        <div class="wallet-info">
          <div>
            <span class="wallet-status" id="walletStatus"></span>
            <span class="wallet-address" id="walletAddress">Not connected</span>
          </div>
          <button class="btn btn-primary" id="connectButton" style="width: auto;">Connect</button>
        </div>
        <div class="network-info" id="networkInfo"></div>
      </div>

      <!-- Contract Info -->
      <div class="card">
        <div class="card-title">Contract Info</div>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Owner</span>
            <span class="info-value mono" id="ownerAddress">--</span>
          </div>
          <div class="info-item">
            <span class="info-label">Minimum Fund</span>
            <span class="info-value" id="minimumUsd">--</span>
          </div>
          <div class="info-item">
            <span class="info-label">ETH / USD</span>
            <span class="info-value" id="ethPrice">--</span>
          </div>
        </div>
      </div>

      <!-- Fund -->
      <div class="card">
        <div class="card-title">Fund</div>
        <div class="input-group">
          <input class="input" type="number" id="ethAmount" placeholder="0.1" step="0.01" min="0" />
          <span class="input-suffix">ETH</span>
        </div>
        <button class="btn btn-primary" id="fundButton" style="margin-top: 0.75rem;">Fund</button>
        <div class="feedback" id="fundFeedback"></div>
      </div>

      <!-- Balance -->
      <div class="card">
        <div class="card-title">Contract Balance</div>
        <div class="balance-display">
          <div class="balance-value" id="balanceValue">--</div>
          <div class="balance-label">ETH</div>
        </div>
        <button class="btn btn-secondary" id="balanceButton">Refresh Balance</button>
      </div>

      <!-- Withdraw -->
      <div class="card">
        <div class="card-title">Withdraw (Owner Only)</div>
        <button class="btn btn-danger" id="withdrawButton">Withdraw All</button>
        <div class="feedback" id="withdrawFeedback"></div>
      </div>

      <!-- Funders -->
      <div class="card">
        <div class="card-title">Funders</div>
        <div id="fundersList" class="funders-list">
          <div class="funders-empty">Connect wallet to view funders</div>
        </div>
      </div>
    </div>

    <script src="./index.js" type="module"></script>
  </body>
</html>
